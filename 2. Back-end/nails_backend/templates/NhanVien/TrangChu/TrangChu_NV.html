{% extends 'base_NV.html' %}

{% block title %}Trang chủ - NV | 2000 Nails & Eyelash{% endblock %}
{% block page_title %}Trang chủ{% endblock %}

{% block content %}
<div style="display: flex; align-items: center; justify-content: center; height: 100%; min-height: 500px;">
    <div style="background-color: white; border-radius: 20px; padding: 50px 60px; width: 100%; max-width: 620px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.06);">
        <p style="font-size: 20px; color: #A38A7E; margin-bottom: 8px;">Chào mừng trở lại</p>
        <h1 style="font-size: 38px; color: #8B7167; margin-bottom: 30px;">
            Xin chào, {{ ten_nhan_vien|default:"Nhân viên" }} !
        </h1>

        <div id="current-date" style="display: flex; align-items: center; justify-content: center; gap: 12px; font-size: 20px; color: #8B7167; margin-bottom: 20px;"></div>

        <p style="font-size: 22px; color: #8B7167; font-weight: 500;">Chúc bạn một ngày làm việc vui vẻ!</p>
    </div>
</div>

<script>
    function showCurrentDate() {
        const el = document.getElementById('current-date');
        const now = new Date();
        const days = ['Chủ Nhật','Thứ Hai','Thứ Ba','Thứ Tư','Thứ Năm','Thứ Sáu','Thứ Bảy'];
        const dayName = days[now.getDay()];
        const day = String(now.getDate()).padStart(2,'0');
        const month = String(now.getMonth()+1).padStart(2,'0');
        const year = now.getFullYear();
        el.innerHTML = `📅 <strong>${dayName}, ${day}/${month}/${year}</strong>`;
    }
    window.onload = showCurrentDate;
</script>
{% endblock %}
